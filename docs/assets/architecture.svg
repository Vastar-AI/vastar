<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 680" font-family="'JetBrains Mono','Fira Code',monospace" font-size="12">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="680" fill="url(#bg)" rx="12"/>

  <!-- CLI -->
  <rect x="280" y="20" width="160" height="36" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="360" y="43" text-anchor="middle" fill="#06b6d4" font-weight="bold" font-size="13">CLI (clap)</text>

  <!-- Line CLI → Coordinator -->
  <line x1="360" y1="56" x2="360" y2="76" stroke="#334155" stroke-width="1.5"/>

  <!-- Coordinator -->
  <rect x="260" y="76" width="200" height="36" rx="8" fill="#0c4a6e" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="360" y="99" text-anchor="middle" fill="#06b6d4" font-weight="bold" font-size="13">Coordinator</text>

  <!-- Line Coordinator → Phase 0 -->
  <line x1="360" y1="112" x2="360" y2="136" stroke="#334155" stroke-width="1.5"/>

  <!-- Phase 0 -->
  <rect x="160" y="136" width="400" height="30" rx="6" fill="rgba(6,182,212,0.08)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="360" y="155" text-anchor="middle" fill="#64748b" font-size="11">Phase 0: Pre-connect (semaphore, max 256 concurrent)</text>

  <!-- Line Phase 0 → Phase 1 -->
  <line x1="360" y1="166" x2="360" y2="184" stroke="#334155" stroke-width="1.5"/>

  <!-- Phase 1 -->
  <rect x="160" y="184" width="400" height="30" rx="6" fill="rgba(6,182,212,0.08)" stroke="#1e3a5f" stroke-width="1"/>
  <text x="360" y="203" text-anchor="middle" fill="#64748b" font-size="11">Phase 1: Distribute connections to workers</text>

  <!-- Line Phase 1 → Workers -->
  <line x1="360" y1="214" x2="360" y2="240" stroke="#334155" stroke-width="1.5"/>

  <!-- Worker fan-out lines -->
  <line x1="360" y1="240" x2="120" y2="260" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="240" x2="280" y2="260" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="240" x2="440" y2="260" stroke="#334155" stroke-width="1"/>
  <line x1="360" y1="240" x2="600" y2="260" stroke="#334155" stroke-width="1"/>

  <!-- Worker 0 -->
  <rect x="60" y="260" width="120" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="280" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">Worker 0</text>

  <!-- Worker 1 -->
  <rect x="220" y="260" width="120" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="280" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">Worker 1</text>

  <!-- ... -->
  <text x="440" y="280" text-anchor="middle" fill="#475569" font-size="14">. . .</text>

  <!-- Worker N -->
  <rect x="540" y="260" width="120" height="32" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="600" y="280" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">Worker N</text>

  <!-- Label -->
  <text x="700" y="280" text-anchor="end" fill="#475569" font-size="10">clamp(C/128, 1, cpus*2)</text>

  <!-- Connection fan-out from Worker 0 -->
  <line x1="120" y1="292" x2="120" y2="320" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="320" x2="70" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="320" x2="120" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="320" x2="170" y2="340" stroke="#334155" stroke-width="1"/>

  <!-- Conn boxes -->
  <rect x="48" y="340" width="44" height="24" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="70" y="356" text-anchor="middle" fill="#f59e0b" font-size="9">Conn</text>

  <rect x="98" y="340" width="44" height="24" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="356" text-anchor="middle" fill="#f59e0b" font-size="9">Conn</text>

  <rect x="148" y="340" width="44" height="24" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="356" text-anchor="middle" fill="#f59e0b" font-size="9">Conn</text>

  <!-- FuturesUnordered label -->
  <text x="360" y="356" text-anchor="middle" fill="#64748b" font-size="10">FuturesUnordered event loop (~128 conns each)</text>

  <!-- Lines down from conns -->
  <line x1="70" y1="364" x2="70" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="364" x2="120" y2="400" stroke="#334155" stroke-width="1"/>
  <line x1="170" y1="364" x2="170" y2="400" stroke="#334155" stroke-width="1"/>

  <!-- Raw TCP -->
  <rect x="40" y="400" width="160" height="28" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="418" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">Raw TCP streams</text>
  <text x="360" y="418" text-anchor="middle" fill="#64748b" font-size="10">hand-crafted HTTP/1.1</text>

  <!-- Line down -->
  <line x1="120" y1="428" x2="120" y2="460" stroke="#334155" stroke-width="1.5"/>

  <!-- BufReader -->
  <rect x="40" y="460" width="160" height="28" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="120" y="478" text-anchor="middle" fill="#c084fc" font-size="10" font-weight="bold">BufReader 32KB</text>
  <text x="360" y="478" text-anchor="middle" fill="#64748b" font-size="10">synchronous header parse + body drain</text>

  <!-- Line down -->
  <line x1="120" y1="488" x2="120" y2="520" stroke="#334155" stroke-width="1.5"/>

  <!-- fill_buf + consume -->
  <rect x="40" y="520" width="160" height="28" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="120" y="538" text-anchor="middle" fill="#c084fc" font-size="10">fill_buf() + consume()</text>
  <text x="360" y="538" text-anchor="middle" fill="#64748b" font-size="10">zero-allocation body drain</text>

  <!-- Line down -->
  <line x1="120" y1="548" x2="120" y2="580" stroke="#334155" stroke-width="1.5"/>

  <!-- AtomicU64 progress -->
  <rect x="40" y="580" width="160" height="28" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="120" y="598" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">AtomicU64 progress</text>
  <text x="360" y="598" text-anchor="middle" fill="#64748b" font-size="10">lock-free, 10 FPS render</text>

  <!-- Legend -->
  <rect x="40" y="636" width="640" height="30" rx="6" fill="rgba(255,255,255,0.02)" stroke="#1e293b" stroke-width="1"/>
  <circle cx="70" cy="651" r="5" fill="#06b6d4"/>
  <text x="82" y="655" fill="#64748b" font-size="10">Coordinator</text>
  <circle cx="180" cy="651" r="5" fill="#22c55e"/>
  <text x="192" y="655" fill="#64748b" font-size="10">Workers</text>
  <circle cx="270" cy="651" r="5" fill="#f59e0b"/>
  <text x="282" y="655" fill="#64748b" font-size="10">Connections</text>
  <circle cx="390" cy="651" r="5" fill="#c084fc"/>
  <text x="402" y="655" fill="#64748b" font-size="10">I/O Layer</text>
  <circle cx="490" cy="651" r="5" fill="#22c55e"/>
  <text x="502" y="655" fill="#64748b" font-size="10">Progress</text>
</svg>
